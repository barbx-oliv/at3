<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT03 - EventMaster </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="btnDark">Alterar Tema 🌗</button>

    <header>
        <h1 id="titulo">Gestão de Convidados - EventMaster</h1>
        <p id="p">Preencha os campos para cadastrar os Convidados</p>
    </header>

    <div class="container-principal">
        <section id="cadastro">
            <form id="formCadastro">
                <h1 class="tituloCa">Cadastro</h1>
                <input type="text" id="nome" placeholder="Nome do convidado">
                <input type="number" id="idade" placeholder="Idade">
                <input type="text" id="cpf" placeholder="CPF">
                <input type="email" id="email" placeholder="E-mail">
                <input type="tel" id="telefone" placeholder="Telefone">
                <button id="btnEnviar">Enviar</button>
            </form>
        </section>

        <section id="confirmado">
            <h1 class="tituloLa">Lista de Confirmados</h1>
            <ul id="listaConfirmado"></ul>
        </section>
    </div>
</body>
<script src="script.js"></script>
</html>

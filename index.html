<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT03 - EventMaster </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gestão de Convidados - EventMaster</h1>
    <button id="btnDark">Modo Escuro</button>
    <section id="cadastro">
        <div class="Cadastro">
        <form id="formCadastro">
                <h2 class="tituloCa">Cadastro</h2>
                <input type="text" name="" id="nome" placeholder="Digite o nome do convidado">
                <input type="idade" name="" id="idade" placeholder="Digite a idade do convidado">
                <input type="text" name="" id="cpf" placeholder="Digite o CPF do convidado">
                <input type="email" name="" id="email" placeholder="Digite o email do convidado">
                <input type="tel" name="" id="telefone" placeholder="Digite o telefone do convidado">

                <button id="btnEnviar">Enviar</button>
            </form>
        </div>
    </section>

    <section id="confirmado">
        <div class="lateral">
            <h2 class="tituloLa">Lista de Confirmados</h2>
            <ul id="listaConfirmado"></ul>
        </div>
    </section>

</body>
<script src="script.js"></script>
</html>
